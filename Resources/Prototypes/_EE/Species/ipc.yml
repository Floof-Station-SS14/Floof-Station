- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceIPC
  categories: [ HideSpawnMenu ]
  name: IPC appearance
  components:
  - type: Inventory
    speciesId: IPC
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
      head:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: head
      mask:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: mask
    displacements:
      head:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: head
      mask:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: mask
  - type: InitialBody
    organs:
      Torso: OrganIPCTorso
      Head: OrganIPCHead
      ArmLeft: OrganIPCArmLeft
      ArmRight: OrganIPCArmRight
      HandRight: OrganIPCHandRight
      HandLeft: OrganIPCHandLeft
      LegLeft: OrganIPCLegLeft
      LegRight: OrganIPCLegRight
      FootLeft: OrganIPCFootLeft
      FootRight: OrganIPCFootRight
      Brain: PositronicBrain
      Eyes: OrganIPCEyes
      Tongue: OrganIPCTongue
      Ears: OrganIPCEars
      Heart: OrganIPCHeart
  - type: HumanoidProfile
    species: IPC

- type: entity
  parent:
  - AppearanceIPC
  - BaseSpeciesMob
  - MobFlammable
  id: MobIPC
  name: Urist McPositronic
  components:
  - type: StunVisuals
  - type: Fingerprint
  - type: Blindable
  - type: MobState
    allowedStates:
    - Alive
    - Dead
  - type: PowerCellDraw
    drawRate: 5.5
  #- type: SiliconEmitSoundOnDrained
  #  sound: "/Audio/Weapons/Guns/EmptyAlarm/smg_empty_alarm.ogg" # SOMEONE PLEASE FIND A BETTER SOUND FOR THIS.
  #  minInterval: 15
  #  maxInterval: 30
  #  popUp: "silicon-power-low"
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellSmall
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: Silicon
    entityType: enum.SiliconType.Player
    batteryPowered: true # Needs to also have a battery!
    chargeThresholdMid: 0.60
    chargeThresholdLow: 0.30
    chargeThresholdCritical: 0
    drainPerSecond: 1
    speedModifierThresholds:
      30: 1
      20: 0.80
      10: 0.45
      1: 0.3
      0: 0.00
  - type: Deathgasp
    prototype: SiliconDeathgasp
    needsCritical: false
  - type: Puller
  - type: Lock
    locked: true
    lockOnClick: false
    unlockOnClick: false
    lockTime: 5
    unlockTime: 5
  - type: EncryptionKeyHolder
    keySlots: 4
    examineWhileLocked: false
    keysExtractionMethod: Cutting
    keysUnlocked: true
  - type: EncryptionHolderRequiresLock
  - type: ActiveRadio
  - type: IntrinsicRadioReceiver
  - type: IntrinsicRadioTransmitter
  - type: WeldingHealable
  - type: SiliconDownOnDead
  - type: Speech
    speechSounds: Pai
  - type: TypingIndicator
    proto: robot
  - type: CreamPied
    sprite:
      sprite: Effects/creampie.rsi
      state: creampie_human
  - type: Vocal
    sounds:
      Male: UnisexIPC
      Female: UnisexIPC
      Unsexed: UnisexIPC
  - type: BodyEmotes
    soundsId: GeneralBodyEmotes
  - type: Damageable
    damageModifierSet: IPC
  - type: MeleeWeapon
    hidden: true
    soundHit:
      collection: Punch
    angle: 30
    animation: WeaponArcFist
    attackRate: 1
    damage:
      types:
        Blunt: 6 # It's tough.
  - type: Temperature
    heatDamageThreshold: 325
    coldDamageThreshold: 260
    currentTemperature: 310.15
    specificHeat: 42
    coldDamage:
      types:
        Cold: 0.1 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 3 #per second, scales with temperature & other constants
    atmosTemperatureTransferEfficiency: 0.05
  - type: BatteryDrinker


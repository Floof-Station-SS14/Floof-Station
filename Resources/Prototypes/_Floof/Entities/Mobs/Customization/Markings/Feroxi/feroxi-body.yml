# HEAD #
- type: marking
  id: MarkingStripesTigerHeadFeroxi
  bodyPart: Head
  groupWhitelist: [ MarkingsFeroxi ]
  coloring:
    default:
      type:
        !type:SimpleColoring
        color: "#FFFFFF"
  sprites:
  - sprite: _DeltaV/Mobs/Customization/Feroxi/body_markings.rsi

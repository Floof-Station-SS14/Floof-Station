- type: entity
  parent: BoxSurvival
  id: BoxSurvivalWater
  suffix: Standard H2O
  name: H2O survival box
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ClothingMaskBreath
        - id: EmergencyTankWaterVaporFilled
        - id: EmergencyMedipen
  - type: Sprite
    layers:
    - state: internals
    - state: emergencytank
  - type: Label
    localizedLabel: reagent-name-water


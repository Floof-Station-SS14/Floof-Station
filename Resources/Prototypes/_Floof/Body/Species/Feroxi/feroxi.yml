      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ MarkingTailFeroxi ]
    enum.HumanoidVisualLayers.Chest:
      limit: 3
      required: false
      default: [ MarkingDorsalFeroxi ]
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: true
      default: [ MarkingSnoutFeroxi ]
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ MarkingEarsFeroxi ]
    enum.HumanoidVisualLayers.HeadSide:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceFeroxi
  categories: [ HideSpawnMenu ]
  name: feroxi appearance
  components:
  - type: Inventory
    speciesId: speciesFeroxi
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
      head:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: head
      mask:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: mask
    displacements:
      head:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: head
      mask:
        sizeMaps:
          32:
            sprite: Mobs/Species/Reptilian/displacement.rsi
            state: mask
  - type: InitialBody
    organs:
      Torso: OrganFeroxiTorso
      Head: OrganFeroxiHead
      ArmLeft: OrganFeroxiArmLeft
      ArmRight: OrganFeroxiArmRight
      HandRight: OrganFeroxiHandRight
      HandLeft: OrganFeroxiHandLeft
      LegLeft: OrganFeroxiLegLeft
      LegRight: OrganFeroxiLegRight
      FootLeft: OrganFeroxiFootLeft
      FootRight: OrganFeroxiFootRight
      Brain: OrganFeroxiBrain
      Eyes: OrganFeroxiEyes
      Tongue: OrganFeroxiTongue
      Appendix: OrganFeroxiAppendix
      Ears: OrganFeroxiEars
      Lungs: OrganFeroxiLungs
      Heart: OrganFeroxiHeart
      Stomach: OrganFeroxiStomach
      Liver: OrganFeroxiLiver
      Kidneys: OrganFeroxiKidneys
  - type: HumanoidProfile
    species: SpeciesFeroxi

- type: entity
  parent:
  - AppearanceFeroxi
  - BaseSpeciesMobOrganic
  id: MobFeroxi
  suffix: Floof
  name: Urist McSwims
  components:
  - type: Damageable
    damageModifierSet: DamageModifiersFeroxi
  - type: Puller
    needsHands: false
  - type: Butcherable
    spawned:
    - id: FoodMeatFeroxi
      amount: 5
  - type: LizardAccent
  - type: Speech
    speechSounds: Lizard
    speechVerb: LargeMob
    allowedEmotes: ['EmoteChomp', 'Thump']
  - type: TypingIndicator
    proto: lizard
  - type: CreamPied
    sprite:
      sprite: Effects/creampie.rsi
      state: creampie_lizard
  - type: Vocal
    emoteSounds: EmoteSoundsMaleFeroxi
  - type: BodyEmotes
    soundsId: EmoteSoundsFeroxi
  - type: MeleeWeapon
    altDisarm: false
    soundHit:
      path: /Audio/Effects/bite.ogg
    animation: WeaponArcBite
    damage:
      types:
        Piercing: 5
  - type: Wagging
  - type: LanguageKnowledge
    speaks:
    - GalacticCommon
    - Carptongue
    understands:
    - GalacticCommon
    - Carptongue

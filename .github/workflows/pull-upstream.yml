name: Pull Upstream

on:
  workflow_dispatch:
  schedule:
  - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Add upstream remote
      run: |
        git remote add upstream https://github.com/space-wizards/space-station-14.git

    - name: Fetch upstream master
      run: |
        git fetch --depth=1 upstream master

    - name: Configure authentication for origin (robust PAT auth)
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      run: |
        git config --global http.https://github.com/.extraheader \
          "AUTHORIZATION: basic $(echo -n x-access-token:${BOT_TOKEN} | base64)"

    - name: Mirror upstream/master to origin/upstream
      run: |
        git push --force origin refs/remotes/upstream/master:refs/heads/upstream
